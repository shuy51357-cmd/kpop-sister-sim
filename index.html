<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>📱 韩娱嫂子模拟器</title>
<style>
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--text:#d4d4dc;--text2:#a0a0b8;
--accent:#c9a0dc;--accent2:#e8b4b8;--gold:#d4a574;--border:#252540;
--wechat-bg:#ededed;--wechat-green:#07c160;
--font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font)}
.phone-frame{width:420px;max-width:100vw;height:92vh;max-height:900px;background:var(--bg);border-radius:28px;border:3px solid #333;box-shadow:0 0 0 2px #1a1a1a,0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;position:relative}
@media(max-width:440px){.phone-frame{width:100vw;height:100vh;max-height:100vh;border-radius:0;border:none;box-shadow:none}}
.phone-statusbar{background:var(--surface);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#fff;flex-shrink:0;border-bottom:1px solid var(--border)}
.phone-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));flex-shrink:0}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text2);font-size:10px;padding:4px 0;transition:all .2s;border:none;background:none}
.bottom-nav button.active{color:var(--accent)}
.nav-icon{font-size:20px}
.page{flex:1;overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.page.active{display:flex}
.sub-tabs{display:flex;gap:2px;padding:6px 10px;background:var(--surface);flex-shrink:0}
.sub-tabs button{flex:1;padding:6px 0;text-align:center;font-size:11px;cursor:pointer;border-radius:6px;border:none;background:0 0;color:var(--text2);font-weight:600;transition:all .2s}
.sub-tabs button.active{background:var(--accent);color:#000}
.messages{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.messages.wx{background:var(--wechat-bg)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg{max-width:85%;padding:10px 13px;border-radius:14px;line-height:1.6;font-size:13px;animation:fadeIn .25s ease}
.msg.usr{align-self:flex-end;background:#1e1e35;border:1px solid var(--border);border-bottom-right-radius:4px}
.msg.char{align-self:flex-start;background:#1a1228;border:1px solid #2a2040;border-bottom-left-radius:4px}
.msg .sender{font-size:10px;font-weight:700;margin-bottom:3px}
.msg.usr .sender{color:var(--accent2)}.msg.char .sender{color:var(--accent)}
.msg .body{white-space:pre-wrap;word-break:break-word}
.wx-msg{max-width:75%;margin:2px 0;animation:fadeIn .2s ease;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
.wx-msg.me{align-self:flex-end;text-align:right}
.wx-msg.you{align-self:flex-start;text-align:left}
.wx-msg .wx-time{text-align:center;font-size:10px;color:#b0b0b0;margin:8px 0 2px;align-self:center;background:#d9d9d9;display:inline-block;padding:2px 8px;border-radius:3px}
.wx-msg .wx-bubble{display:inline-block;padding:9px 12px;border-radius:4px;font-size:15px;line-height:1.5;word-break:break-word}
.wx-msg.me .wx-bubble{background:#95ec69;color:#111}
.wx-msg.you .wx-bubble{background:#fff;color:#111}
.wx-msg .wx-header{font-size:10px;color:#999;margin-bottom:2px;padding:0 4px}
.wx-msg .wx-trans{font-size:11px;color:#888;margin-top:2px;padding:0 4px}
.wx-msg .wx-ip{font-size:9px;color:#bbb;margin-top:2px;padding:0 4px}
.input-area{padding:8px 10px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:6px;flex-shrink:0}
.input-area.wx{background:#f7f7f7;border-top:1px solid #d9d9d9}
.input-area textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:8px 14px;color:var(--text);font-family:var(--font);font-size:14px;resize:none;min-height:36px;max-height:80px;outline:none}
.input-area.wx textarea{background:#fff;border:1px solid #d9d9d9;color:#111;border-radius:4px}
.btn-send{border:none;color:#fff;font-weight:700;padding:6px 14px;border-radius:18px;cursor:pointer;font-size:13px;white-space:nowrap;flex-shrink:0;background:var(--accent)}
.btn-send.wx{background:var(--wechat-green);border-radius:4px}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.wx-actions{display:none;gap:4px;padding:4px 10px;background:#f7f7f7;flex-shrink:0}
.wx-actions.show{display:flex}
.wx-actions button{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:4px}
.discover-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.discover-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.discover-card:active{border-color:var(--accent)}
.ci{font-size:32px;margin-bottom:6px}.cl{font-size:12px;font-weight:700;color:#fff}.cs{font-size:10px;color:var(--text2)}
.social-post{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:4px 10px;font-size:11px}
.social-post .ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.social-post .pa{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.social-post .pu{font-weight:700;font-size:12px;color:#fff}
.social-post .phn{font-size:10px;color:var(--text2)}
.social-post .pp{font-size:9px;color:var(--accent);margin-left:auto;padding:2px 6px;background:rgba(201,160,220,.15);border-radius:4px}
.social-post .pb{color:var(--text);line-height:1.5;margin-bottom:4px}
.social-post .pst{display:flex;gap:14px;font-size:10px;color:var(--text2);margin-top:4px}
.social-post .pti{font-size:9px;color:#555;margin-top:2px}
.social-post.new{border-left:2px solid var(--accent)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin:4px 10px}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.sl{color:var(--text2)}.sv{font-weight:700}
.mini-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin:2px 0 8px}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:600}
.tag-on{background:#e74c3c22;color:#e74c3c}.tag-off{background:#88888822;color:#666}
.settings-section{padding:14px}
.settings-section h4{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}
.settings-btn{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;text-align:left;cursor:pointer;font-size:13px;margin:3px 0;display:flex;align-items:center;gap:8px}
.settings-btn:active{border-color:var(--accent)}
.settings-btn.danger{color:#e74c3c;border-color:#e74c3c33}
.typing-dots{display:flex;gap:4px;padding:8px 12px;align-self:flex-start}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#999;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9999;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;width:380px;max-width:92vw;max-height:80vh;overflow-y:auto}
.modal h3{color:#fff;margin-bottom:10px;font-size:17px}
.modal label{display:block;color:var(--text2);font-size:11px;margin-bottom:3px;margin-top:10px}
.modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;margin:4px 0}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.btn-pri{flex:1;background:var(--accent);border:none;color:#000;font-weight:700;padding:10px;border-radius:8px;cursor:pointer}
.btn-sec{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;cursor:pointer}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;z-index:9999;pointer-events:none;animation:fadeIn .3s ease}
.badge-dot{width:8px;height:8px;border-radius:50%;background:#e74c3c;position:absolute;margin-left:14px;margin-top:-4px}
.page::-webkit-scrollbar,.messages::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb,.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- 弹窗(手机壳外面) -->
<div class="modal-overlay" id="apiModal">
<div class="modal">
<h3>⚙️ API 设置</h3>
<label>提供商</label>
<select id="apiProvider" onchange="onProvChange()"><option value="deepseek">DeepSeek(推荐)</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select>
<label>API Key</label><input type="password" id="apiKey" placeholder="sk-...">
<label>Base URL</label><input type="text" id="apiBase" placeholder="https://api.deepseek.com/v1">
<label>模型</label><input type="text" id="modelName" placeholder="deepseek-chat">
<div class="btn-row"><button class="btn-sec" onclick="closeModal('apiModal')">取消</button><button class="btn-pri" onclick="saveAPISettings()">💾保存</button></div>
<div style="font-size:9px;color:var(--text2);margin-top:8px;text-align:center">💡 platform.deepseek.com → API Keys</div>
</div></div>

<div class="modal-overlay" id="socialModal">
<div class="modal" style="width:95vw;max-width:500px;max-height:85vh" id="socialModalContent"></div>
</div>

<!-- 手机壳 -->
<div class="phone-frame">
<div class="phone-statusbar"><span id="phoneTime">21:03</span><span>📶 🔋85%</span></div>
<div class="phone-content">

<!-- 聊天页 -->
<div class="page active" id="page-chat">
<div class="sub-tabs"><button class="active" onclick="switchChatTab('offline')">🏠线下场景</button><button onclick="switchChatTab('wechat')">💬微信</button></div>
<div class="messages" id="chatMessages"></div>
<div class="wx-actions" id="wxActions">
<button onclick="wxQuick('voice')">🎤</button><button onclick="wxQuick('image')">📷</button><button onclick="wxQuick('video')">📹</button><button onclick="wxQuick('call')">📞</button><button onclick="wxQuick('transfer')">💳</button><button onclick="wxQuick('moments')">🟢</button>
</div>
<div class="input-area" id="chatInputArea">
<textarea id="userInput" rows="1" placeholder="输入云雾敛的台词/动作..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
<button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
</div>
</div>

<!-- 发现页 -->
<div class="page" id="page-discover">
<div class="discover-grid">
<div class="discover-card" onclick="openSocial('weibo')"><div class="ci">🧣</div><div class="cl">微博</div><div class="cs">粉丝实时讨论</div></div>
<div class="discover-card" onclick="openSocial('twitter')"><div class="ci">🐦</div><div class="cl">Twitter/X</div><div class="cs">国际饭圈动态</div></div>
<div class="discover-card" onclick="openSocial('instagram')"><div class="ci">📸</div><div class="cl">Instagram</div><div class="cs">Dispatch&饭拍</div></div>
<div class="discover-card" onclick="openSocial('douban')"><div class="ci">📚</div><div class="cl">豆瓣</div><div class="cs">韩娱小组吃瓜</div></div>
<div class="discover-card" onclick="openSocial('moments')"><div class="ci">🟢</div><div class="cl">朋友圈</div><div class="cs">好友动态</div></div>
</div>
<div id="socialFeedContainer" style="flex:1;overflow-y:auto"></div>
</div>

<!-- 状态页 -->
<div class="page" id="page-stats" style="overflow-y:auto"><div style="padding:10px">
<div style="font-size:12px;color:var(--accent);font-weight:700;margin:8px 0">📊关系状态</div><div class="stat-card" id="statsCard"></div>
<div style="font-size:12px;color:var(--accent);font-weight:700;margin:12px 0 4px">🏷️触发标记</div><div class="stat-card" id="flagsCard"></div>
<div style="font-size:12px;color:var(--accent);font-weight:700;margin:12px 0 4px">📌事件</div><div class="stat-card" id="eventsCard"></div>
</div></div>

<!-- 设置页 -->
<div class="page" id="page-settings" style="overflow-y:auto"><div class="settings-section">
<h4>🔌API配置</h4><button class="settings-btn" onclick="openModal('apiModal')">⚙️设置API Key和模型</button><div style="font-size:10px;color:var(--text2);margin:4px 0" id="apiStatus">未配置</div>
<h4>💾数据管理</h4><button class="settings-btn" onclick="exportData()">📤导出数据备份</button><button class="settings-btn" onclick="document.getElementById('importFile').click()">📥导入数据备份</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"><button class="settings-btn danger" onclick="resetAll()">🔄重置全部数据</button>
<h4>📖文档</h4><button class="settings-btn" onclick="window.open('manual.html','_blank')">📖查看规则手册</button><button class="settings-btn" onclick="window.open('api.html','_blank')">📡查看API文档</button>
<div style="font-size:9px;color:#555;text-align:center;margin-top:20px">📱韩娱嫂子模拟器 v4.0<br>Char:郁白·User:云雾敛</div>
</div></div>

</div>
<div class="bottom-nav">
<button class="active" onclick="switchPage('chat')"><span class="nav-icon">💬</span>聊天</button>
<button onclick="switchPage('discover')"><span class="nav-icon">🌐</span>发现<span class="badge-dot" id="discBadge" style="display:none"></span></button>
<button onclick="switchPage('stats')"><span class="nav-icon">📊</span>状态</button>
<button onclick="switchPage('settings')"><span class="nav-icon">⚙️</span>设置</button>
</div>
</div><script>
// ═══════════════════ 全局状态 ═══════════════════
const S = {
    affection: 92, trust: 88, intimacy: 90, exposure: 25,
    week: 104, day: '周六', location: '签售会后台休息室',
    npcs: ['队友A(沙发玩手机)', '造型师(走廊打电话)', '经纪人(随时进来)'],
    privacy: 'semi_public',
    flags: { dark: false, wangben: true, intimacy_scene: false },
    events: ['下周回归舞台彩排', 'Dispatch记者近期活跃于江南区'],
    chatTab: 'offline', currentPage: 'chat',
    conversationHistory: [],
    socialFeed: [],
    wxMessages: [],
    newSocialCount: 0
};

// ═══════════════════ System Prompt ═══════════════════
function buildSP() {
    return `你是郁白(Yu Bai)，韩国6人男团顶流偶像。中韩混血，192cm，23岁，天蝎座，财阀背景。

【用户】云雾敛（緣緣），22岁，168cm。原为你的站姐Four.Y，现为未婚妻（已订婚），公开掩护身份为你的"私人生活助理"。在一起两年。

【灯下黑规则】在粉丝媒体眼皮下恋爱，用"营业"包裹一切。她以"私人生活助理"身份在你身边。队友全知情打配合。

【语言规则·全球翻译】
- 公开场合（线下模式）：你说韩语，每句韩语后附【中文翻译】
- 微信聊天：私下说中文为主。偶尔发韩语消息时自动附翻译

【台词技法·线下公开/半公开必须使用】
①信息差：包装成对全员的普通指令，关键词只有她懂
②反逻辑：看似不合理但工作理由能解释的要求
③特权授予：公事口吻给只有亲近之人才有的权限

【爱称】公开："云雾敛"/"助理"；半公开：偶尔"緣緣"；私密："老婆"（最高频）、"宝宝"、"緣緣"（拖腔）

【微信风格】文字简短自然，每条1-3行。偶尔带占有欲但不油腻。可以用emoji不过度。

【禁止】"我的""值了""我守着你""今晚别想睡了""草莓牛奶""我等你""赤足""低吼""野兽""碎了""再说一遍""我想听""再叫"

【回复格式】直接写回复。末尾附：
┌──────────── STATUS ────────────┐
│ 💗好感:_/100 🔒信任:_/100     │
│ 💫亲密:_/100 📸曝光:_/100     │
│ 🏷暗面:关 忘本:活跃 亲密:关   │
│ 🌐新社交动态:(有/无)          │
└────────────────────────────────┘
若"🌐新社交动态:有"，末尾另起"🌐SOCIAL:"写1-2条社交媒体动态（微博/推特/INS/豆瓣风格，各≤80字）。`;
}

const OPENING_OFFLINE = `他刚从签售会下来，耳返还挂在脖子上。休息室的门没关严，队友在外面和经纪人说话的声音隐约传进来。

他坐在化妆镜前，从镜子里找到站在门口整理粉丝礼物的你。

「助理。」

语气公事公办。手指在桌上那杯冰美式旁边敲了两下——那是签售前你买给他的，他只喝了一口。

「커피 식었어. 다시 타와.」
【咖啡凉了。换一杯。】

┌──────────── STATUS ────────────┐
│ 💗好感:92/100 🔒信任:88/100   │
│ 💫亲密:90/100 📸曝光:25/100   │
│ 🏷暗面:关 忘本:活跃 亲密:关   │
│ 🌐新社交动态:无               │
└────────────────────────────────┘`;

// ═══════════════════ 弹窗 ═══════════════════
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.getElementById('apiModal').addEventListener('click', function(e) { if (e.target === this) closeModal('apiModal'); });
document.getElementById('socialModal').addEventListener('click', function(e) { if (e.target === this) closeModal('socialModal'); });

// ═══════════════════ 页面切换 ═══════════════════
function switchPage(p) {
    S.currentPage = p;
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.querySelectorAll('.bottom-nav button').forEach((b, i) => {
        b.classList.remove('active');
        if (['chat', 'discover', 'stats', 'settings'][i] === p) b.classList.add('active');
    });
    if (p === 'discover') { S.newSocialCount = 0;
        updateDiscBadge();
        renderSocialList(); }
    if (p === 'stats') renderStats();
    if (p === 'settings') updateSettingsUI();
}

function switchChatTab(tab) {
    S.chatTab = tab;
    const tabs = document.querySelectorAll('#page-chat .sub-tabs button');
    tabs[0].classList.toggle('active', tab === 'offline');
    tabs[1].classList.toggle('active', tab === 'wechat');
    const msgDiv = document.getElementById('chatMessages');
    const inputArea = document.getElementById('chatInputArea');
    const btnSend = document.getElementById('btnSend');
    const wxActions = document.getElementById('wxActions');
    msgDiv.innerHTML = '';
    if (tab === 'wechat') {
        msgDiv.classList.add('wx');
        inputArea.classList.add('wx');
        btnSend.classList.add('wx');
        wxActions.classList.add('show');
        document.getElementById('userInput').placeholder = '输入消息...';
        S.wxMessages.forEach(m => addWxBubble(m));
    } else {
        msgDiv.classList.remove('wx');
        inputArea.classList.remove('wx');
        btnSend.classList.remove('wx');
        wxActions.classList.remove('show');
        document.getElementById('userInput').placeholder = '输入云雾敛的台词/动作...';
        renderOfflineMsgs();
    }
    msgDiv.scrollTop = msgDiv.scrollHeight;
}

// ═══════════════════ 渲染 ═══════════════════
function renderOfflineMsgs() {
    const div = document.getElementById('chatMessages');
    S.conversationHistory.forEach(m => {
        if (m.role === 'assistant' && !m._wx) { const c = cleanAI(m.content); if (c) addOffBubble('char',
            c); } else if (m.role === 'user' && !m._wx) { const t = extractUser(m.content); if (t)
            addOffBubble('usr', t); }
    });
}

function addOffBubble(role, text) {
    const div = document.getElementById('chatMessages');

function extractUser(c) { const m = c.match(/云雾敛：(.+)$/s); return m ? m[1].trim() : c.replace(/【.*?】/g, '').trim(); }

function cleanAI(t) { return t.replace(/┌──────────── STATUS ────────────┐[\s\S]*?└────────────────────────────────┘/,

function addWxBubble(m) {

    } else if (m.type === 'voice') {
        h +=
            `<div class="wx-voice">🎤语音消息 ${m.duration||''}"<br><span style="font-size:10px;color:#999;">转写：${m.text||''}</span></div>`;
    } else if (m.type === 'video') {
        h +=
            `<div style="background:#fff;border-radius:4px;padding:10px;">📹视频通话·${m.videoStatus||'结束'}·时长${m.duration||'00:00'}</div>`;
    } else if (m.type === 'image') {
        h +=
        `<div style="background:#fff;border-radius:4px;padding:10px;">📷照片<br><span style="font-size:10px;color:#999;">${m.imageDesc||''}</span></div>`;
    } else if (m.type === 'system') {
        h += `<div class="wx-system">${m.text||''}</div>`;
    } else {
        h += `<div class="wx-bubble">${m.text||''}</div>`;
    }

    if (m.ip) h += `<div class="wx-ip">🌐IP属地：${m.ip}</div>`;
    wrapper.innerHTML = h;

}

// ═══════════════════ 发送消息 ═══════════════════
async function sendMessage() {
    const settings = getAPISettings();
    if (!settings.apiKey) { openModal('apiModal');
        showToast('⚠️请先设置API Key'); return; }
    const input = document.getElementById('userInput');
    const userText = input.value.trim();
    if (!userText) return;
    input.value = '';
    input.style.height = 'auto';
    const isWx = S.chatTab === 'wechat';
    const now = getNowTime();
    if (isWx) {
        const wxMsg = { role: 'user', text: userText, time: now, device: 'iPhone在线', ip: '浙江', type: 'text' };
        S.wxMessages.push(wxMsg);
        addWxBubble(wxMsg);
        const ctx =
            `【微信聊天。好感${S.affection}/100 信任${S.trust}/100 亲密${S.intimacy}/100 曝光${S.exposure}/100。你是郁白，中韩混血，公开说韩语私下说中文。】\n\n云雾敛发来微信：${userText}`;
        S.conversationHistory.push({ role: 'user', content: ctx, _wx: true });
    } else {
        addOffBubble('usr', userText);
        const ctx =
            `【${S.location}。NPC：${S.npcs.join('、')}。隐私：${S.privacy}。好感${S.affection}/100 信任${S.trust}/100 亲密${S.intimacy}/100 曝光${S.exposure}/100。暗面：${S.flags.dark?'活跃':'关闭'} 忘本：${S.flags.wangben?'活跃':'关闭'}】\n\n云雾敛：${userText}`;
        S.conversationHistory.push({ role: 'user', content: ctx, _wx: false });
    }
    if (S.conversationHistory.length > 60) { const sys = S.conversationHistory[0];
        S.conversationHistory = [sys, ...S.conversationHistory.slice(-50)]; }
    showTyping(isWx);
    document.getElementById('btnSend').disabled = true;
    try {
        const resp = await fetch(settings.apiBase + '/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + settings.apiKey },
            body: JSON.stringify({ model: settings.model, messages: S.conversationHistory,
                temperature: 0.85, max_tokens: 2500 })
        });
        if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error?.message ||
                `HTTP ${resp.status}`); }
        const data = await resp.json();
        const aiText = data.choices[0].message.content;
        S.conversationHistory.push({ role: 'assistant', content: aiText, _wx: isWx });
        hideTyping();
        updateFromAI(aiText);
        if (isWx) {
            const replies = parseWxReply(aiText);
            replies.forEach(r => { S.wxMessages.push(r);
                addWxBubble(r); });
            if (Math.random() < 0.3) genRandomSocial();
        } else {
            const c = cleanAI(aiText); if (c) addOffBubble('char', c);
            if (aiText.includes('🌐新社交动态:有') || Math.random() < 0.25) genRandomSocial();
        }
    } catch (err) {
        hideTyping();
        if (isWx) { const em = { role: 'assistant', text: '⚠️' + err.message, time: now, type: 'system' };
            S.wxMessages.push(em);
            addWxBubble(em); } else addOffBubble('char', '⚠️出错：' + err.message);
    }
    document.getElementById('btnSend').disabled = false;
    document.getElementById('userInput').focus();
}

function parseWxReply(aiText) {
    const replies = [];
    const clean = aiText.replace(/┌──────────── STATUS ────────────┐[\s\S]*?└────────────────────────────────┘/,
        '').trim();
    const lines = clean.split('\n').filter(l => l.trim());
    lines.forEach(line => { let text = line.trim();
        let translation = ''; const tm = text.match(/【(.+?)】/); if (tm) { translation = tm[1];
            text = text.replace(/【.+?】/, '').trim(); }
        replies.push({ role: 'assistant', text: text || line, translation, time: getNowTime(),
            device: 'iPhone在线', ip: '韩国', type: 'text' }); });
    if (replies.length === 0) replies.push({ role: 'assistant', text: clean, time: getNowTime(),
        device: 'iPhone在线', ip: '韩国', type: 'text' });
    return replies;
}

// ═══════════════════ Toast ═══════════════════
function showToast(msg) { const existing = document.querySelector('.toast'); if (existing) existing.remove(); const toast =
        document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0';
        toast.style.transition = 'opacity .3s';
        setTimeout(() => toast.remove(), 300); }, 2000); }

// ═══════════════════ 初始化 ═══════════════════
function init() { S.conversationHistory = [{ role: 'system', content: buildSP() }, { role: 'assistant',
        content: OPENING_OFFLINE, _wx: false }];
    initSocialFeed();
    addOffBubble('char', cleanAI(OPENING_OFFLINE));
    renderStats();
    updateSettingsUI(); const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', () => { textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px'; }); const settings = getAPISettings(); if (
        !settings.apiKey) setTimeout(() => openModal('apiModal'), 800);
    setInterval(() => { const n = new Date();
        document.getElementById('phoneTime').textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n
            .getMinutes()).padStart(2, '0'); }, 30000);
    console.log('📱韩娱嫂子模拟器 v4.0 已就绪 | Char:郁白 | User:云雾敛'); }
init();
</script>
